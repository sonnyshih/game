<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接水果大作戰</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: #2c3e50;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.game-container {
    position: relative;
    width: 800px;
    height: 600px;
    background-color: #ecf0f1;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    overflow: hidden;
}

canvas {
    display: block;
}

.ui-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none; /* Let clicks pass through to canvas if needed */
}

.hud {
    position: absolute;
    top: 20px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    font-size: 24px;
    font-weight: bold;
    color: #34495e;
    text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.8);
}

.modal {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: rgba(255, 255, 255, 0.95);
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
    pointer-events: auto; /* Re-enable pointer events for modal buttons */
}

.modal h1 {
    color: #e74c3c;
    font-size: 48px;
    margin-bottom: 10px;
}

.modal p {
    font-size: 24px;
    margin-bottom: 20px;
    color: #2c3e50;
}

.modal button {
    background-color: #3498db;
    color: white;
    border: none;
    padding: 12px 30px;
    font-size: 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.2s;
}

.modal button:hover {
    background-color: #2980b9;
}

.hidden {
    display: none !important;
}

@keyframes shake {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    10% { transform: translate(-1px, -2px) rotate(-1deg); }
    20% { transform: translate(-3px, 0px) rotate(1deg); }
    30% { transform: translate(3px, 2px) rotate(0deg); }
    40% { transform: translate(1px, -1px) rotate(1deg); }
    50% { transform: translate(-1px, 2px) rotate(-1deg); }
    60% { transform: translate(-3px, 1px) rotate(0deg); }
    70% { transform: translate(3px, 1px) rotate(-1deg); }
    80% { transform: translate(-1px, -1px) rotate(1deg); }
    90% { transform: translate(1px, 2px) rotate(0deg); }
    100% { transform: translate(1px, -2px) rotate(-1deg); }
}

.shake {
    animation: shake 0.3s;
}
    </style>
</head>
<body>
    <div class="game-container">
        <div class="ui-layer">
            <div class="hud">
                <div class="score">分數: <span id="score">0</span></div>
                <div class="lives">生命: <span id="lives">3</span></div>
            </div>
            
            <div id="game-over" class="modal hidden">
                <h1>Game Over</h1>
                <p>最終分數: <span id="final-score">0</span></p>
                <button id="restart-btn">重新開始</button>
            </div>
            
            <div id="countdown-overlay" class="modal hidden">
                <h1 id="countdown-text" style="font-size: 80px; color: #2c3e50;">3</h1>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    
    <script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');
const livesElement = document.getElementById('lives');
const gameOverScreen = document.getElementById('game-over');
const finalScoreElement = document.getElementById('final-score');
const restartBtn = document.getElementById('restart-btn');
const countdownOverlay = document.getElementById('countdown-overlay');
const countdownText = document.getElementById('countdown-text');

// Game Constants
const GAME_WIDTH = canvas.width;
const GAME_HEIGHT = canvas.height;
const PLAYER_SPEED = 7;
const FRUIT_FALL_SPEED_BASE = 1.5;
const FRUIT_SPAWN_RATE_MS = 1000;
const INITIAL_LIVES = 3;

// Game State
let score = 0;
let lives = INITIAL_LIVES;
let isGameOver = false;
let isPlaying = false;
let lastTime = 0;
let fruitSpawnTimer = 0;

// Emojis for fruits
const fruitsList = ['🍎', '🍌', '🍉', '🍇', '🍓', '🍊'];

// Key states
const keys = {
    ArrowLeft: false,
    ArrowRight: false
};

document.addEventListener('keydown', (e) => {
    if (keys.hasOwnProperty(e.code)) {
        keys[e.code] = true;
    }
});

document.addEventListener('keyup', (e) => {
    if (keys.hasOwnProperty(e.code)) {
        keys[e.code] = false;
    }
});

class Player {
    constructor() {
        this.width = 80;
        this.height = 40;
        this.x = GAME_WIDTH / 2 - this.width / 2;
        this.y = GAME_HEIGHT - this.height - 20; // 20px padding from bottom
        this.color = '#3498db';
        this.icon = '🧺';
    }

    update() {
        if (keys.ArrowLeft) this.x -= PLAYER_SPEED;
        if (keys.ArrowRight) this.x += PLAYER_SPEED;

        // Boundary checks
        if (this.x < 0) this.x = 0;
        if (this.x + this.width > GAME_WIDTH) this.x = GAME_WIDTH - this.width;
    }

    draw(ctx) {
        // Draw basket emoji as player
        ctx.font = '50px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.icon, this.x + this.width/2, this.y + this.height/2);
    }
}

class Fruit {
    constructor() {
        this.size = 36;
        this.x = Math.random() * (GAME_WIDTH - this.size) + this.size/2;
        this.y = -this.size;
        // slightly increase speed as score goes up
        this.speed = FRUIT_FALL_SPEED_BASE + (score * 0.1); 
        this.icon = fruitsList[Math.floor(Math.random() * fruitsList.length)];
        this.markedForDeletion = false;
    }

    update() {
        this.y += this.speed;
        if (this.y > GAME_HEIGHT + this.size) {
            this.markedForDeletion = true;
            loseLife();
        }
    }

    draw(ctx) {
        ctx.font = `${this.size}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.icon, this.x, this.y);
    }
}

let player;
let fruits;

function initGame() {
    player = new Player();
    fruits = [];
    score = 0;
    lives = INITIAL_LIVES;
    isGameOver = false;
    isPlaying = false;
    lastTime = 0;
    fruitSpawnTimer = 0;
    
    updateHUD();
    gameOverScreen.classList.add('hidden');
    
    startCountdown(3);
}

function startCountdown(seconds) {
    countdownOverlay.classList.remove('hidden');
    countdownText.innerText = seconds;
    
    ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    player.draw(ctx);
    
    let counter = seconds;
    const interval = setInterval(() => {
        counter--;
        if (counter > 0) {
            countdownText.innerText = counter;
        } else if (counter === 0) {
            countdownText.innerText = "GO!";
        } else {
            clearInterval(interval);
            countdownOverlay.classList.add('hidden');
            isPlaying = true;
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
    }, 1000);
}

function loseLife() {
    if (isGameOver) return;
    lives--;
    updateHUD();
    
    const container = document.querySelector('.game-container');
    container.style.backgroundColor = '#ffcccc';
    container.classList.add('shake');
    setTimeout(() => {
        container.style.backgroundColor = '#ecf0f1';
        container.classList.remove('shake');
    }, 300);

    if (lives <= 0) {
        gameOver();
    }
}

function gameOver() {
    isGameOver = true;
    finalScoreElement.innerText = score;
    gameOverScreen.classList.remove('hidden');
}

function updateHUD() {
    scoreElement.innerText = score;
    livesElement.innerText = lives;
}

function checkCollision(player, fruit) {
    // Basic rectangle collision, tuned for emoji drawing logic
    const fruitRadius = fruit.size / 2;
    const px = player.x;
    const py = player.y;
    const pw = player.width;
    const ph = player.height;
    
    // Fruit center
    const fx = fruit.x;
    const fy = fruit.y;

    if (fx > px - fruitRadius && 
        fx < px + pw + fruitRadius &&
        fy > py - fruitRadius &&
        fy < py + ph + fruitRadius) {
        return true;
    }
    return false;
}

function gameLoop(timestamp) {
    if (isGameOver || !isPlaying) return;

    let deltaTime = timestamp - lastTime;
    lastTime = timestamp;

    // Clear canvas
    ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

    // Update and draw player
    player.update();
    player.draw(ctx);

    // Spawn fruits
    if (fruitSpawnTimer > Math.max(200, FRUIT_SPAWN_RATE_MS - score * 10)) {
        fruits.push(new Fruit());
        fruitSpawnTimer = 0;
    } else {
        fruitSpawnTimer += deltaTime;
    }

    // Update and draw fruits
    fruits.forEach(fruit => {
        fruit.update();
        fruit.draw(ctx);
        
        // Check collision
        if (checkCollision(player, fruit)) {
            fruit.markedForDeletion = true;
            score++;
            updateHUD();
        }
    });

    // Remove deleted fruits
    fruits = fruits.filter(fruit => !fruit.markedForDeletion);

    requestAnimationFrame(gameLoop);
}

restartBtn.addEventListener('click', () => {
    initGame();
});

// Start the game for the first time
initGame();
    </script>
</body>
</html>
